name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Initialize Bubblewrap project
        run: |
          mkdir -p twa-build
          cd twa-build
          bubblewrap init \
            --manifest="https://sadat7urp.github.io/bd-land-acquisition-calculator/manifest.json" \
            --directory="." \
            --skipPwaValidation
        continue-on-error: true

      - name: Build APK and AAB
        run: |
          cd twa-build
          bubblewrap build --skipPwaValidation
        continue-on-error: true

      - name: List build outputs
        run: |
          find twa-build -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found"
          find . -name "*.apk" -o -name "*.aab" 2>/dev/null | head -20

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: BD-Land-Acquisition-Calculator-APK
          path: |
            twa-build/*.apk
            twa-build/*.aab
            twa-build/app/build/outputs/**/*.apk
            twa-build/app/build/outputs/**/*.aab
          if-no-files-found: warn
          retention-days: 30
